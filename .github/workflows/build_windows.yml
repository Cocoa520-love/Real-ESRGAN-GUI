name: build-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  # 修复你遇到的 Node.js 24 警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          
      - run: flutter pub get
      
      # 执行打包
      - name: Build Flutter
        run: flutter build ${{ matrix.os == 'windows-latest' && 'windows' || 'macos' }} --release

      # 关键步骤：上传打包后的文件
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-release-files
          path: |
            ${{ matrix.os == 'windows-latest' && 'build/windows/x64/runner/Release' || 'build/macos/Build/Products/Release' }}
